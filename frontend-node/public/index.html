<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPKI 演示面板</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <h1>RPKI 冲突检测演示面板</h1>
    <p class="sub">保持与 <code>demo-flow.sh</code> 同样 6 步流程，结果可视化展示。</p>

    <section class="toolbar">
      <label>Conflict ID:
        <input id="conflictId" type="text" value="1" />
      </label>
      <button id="runBtn">运行 6 步演示</button>
      <span id="status"></span>
    </section>

    <section class="toolbar">
      <button id="openSourceBtn">打开数据来源目录</button>
      <button id="openSwaggerBtn">打开 Swagger</button>
      <button id="queryCertsBtn">查询证书表（分页）</button>
      <button id="queryConflictsBtn">查询冲突表（分页）</button>
      <label>page:<input id="page" type="number" value="1" min="1" style="width:72px" /></label>
      <label>size:<input id="size" type="number" value="10" min="1" max="100" style="width:72px" /></label>
      <label>rir:<input id="rir" type="text" placeholder="可空" style="width:90px" /></label>
      <label>hasConflict:
        <select id="hasConflict">
          <option value="">(可空)</option>
          <option value="true">true</option>
          <option value="false">false</option>
        </select>
      </label>
    </section>

    <section id="meta" class="meta"></section>
    <section id="db" class="card" style="display:none"></section>
    <section id="steps" class="steps"></section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
